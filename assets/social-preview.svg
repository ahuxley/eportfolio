<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Andrew Huxley social preview</title>
  <desc id="desc">Portfolio preview card for Andrew Huxley</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f4efe7"/>
      <stop offset="100%" stop-color="#efe5d8"/>
    </linearGradient>
    <linearGradient id="panel" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#17324d"/>
      <stop offset="100%" stop-color="#204466"/>
    </linearGradient>
    <radialGradient id="glowA" cx="0%" cy="0%" r="100%">
      <stop offset="0%" stop-color="#bd5e35" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#bd5e35" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowB" cx="100%" cy="100%" r="100%">
      <stop offset="0%" stop-color="#2f7c78" stop-opacity="0.45"/>
