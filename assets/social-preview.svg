  <rect width="1200" height="630" fill="url(#glowB)"/>
  <rect x="64" y="58" width="1072" height="514" rx="36" fill="rgba(255,250,242,0.78)" stroke="rgba(23,50,77,0.12)"/>
  <rect x="690" y="104" width="360" height="422" rx="30" fill="url(#panel)"/>
