  <text x="112" y="404" fill="#415a73" font-family="'Source Sans 3', sans-serif" font-size="34">Experience-first portfolio focused on</text>
  <text x="112" y="448" fill="#415a73" font-family="'Source Sans 3', sans-serif" font-size="34">IT support, analytics, and dependable execution.</text>
  <text x="754" y="176" fill="#f8f4ed" font-family="'IBM Plex Mono', monospace" font-size="24" letter-spacing="4">OPEN TO OPPORTUNITIES</text>
  <text x="754" y="272" fill="#fff8f0" font-family="'Sora', sans-serif" font-size="42" font-weight="700">Steady support.</text>
  <text x="754" y="324" fill="#fff8f0" font-family="'Sora', sans-serif" font-size="42" font-weight="700">Clear systems.</text>
  <text x="754" y="376" fill="#fff8f0" font-family="'Sora', sans-serif" font-size="42" font-weight="700">Practical growth.</text>
  <rect x="754" y="430" width="170" height="46" rx="23" fill="#fff8f0" opacity="0.14"/>
  <text x="785" y="460" fill="#fff8f0" font-family="'Source Sans 3', sans-serif" font-size="24">GitHub Pages</text>
