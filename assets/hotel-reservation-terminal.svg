      <tspan x="154" dy="26">Luxury Suite    $258.99/day  +  $21.59 fee   $1553.99/week +  $129.59 fee</tspan>
      <tspan x="154" dy="32">Select an option (1-3): 3</tspan>
      <tspan x="154" dy="26">Thanks for using the reservation system.</tspan>
