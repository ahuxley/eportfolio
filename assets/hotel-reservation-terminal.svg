      <tspan x="154" dy="26">Double          $128.99/day  +  $21.59 fee    $778.99/week  +  $129.59 fee</tspan>
      <tspan x="154" dy="26">Queen Suite     $178.99/day  +  $21.59 fee   $1073.99/week +  $129.59 fee</tspan>
