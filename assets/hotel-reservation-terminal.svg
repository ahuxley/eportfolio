  <rect x="866" y="88" width="214" height="42" rx="21" fill="#FFF9F4" stroke="#E5D3C7"/>
  <text x="973" y="114" text-anchor="middle" fill="#42576D" font-family="IBM Plex Mono, monospace" font-size="14" font-weight="700">CLI screenshot asset</text>
