    <text x="154" y="634" fill="#EAF2FB" font-family="IBM Plex Mono, monospace" font-size="15">
      <tspan x="154" dy="0">&gt; python finalproject.py</tspan>
      <tspan x="154" dy="26">Select an option (1-3): 2</tspan>
      <tspan x="154" dy="26">Enter the number for the room type: 2</tspan>
      <tspan x="154" dy="26">Enter 1 for Daily or 2 for Weekly: 1</tspan>
      <tspan x="154" dy="26">How many days will you stay? 5</tspan>
    </text>
    <rect x="648" y="610" width="374" height="70" rx="18" fill="#173B37" stroke="#2F6F6B"/>
    <text x="674" y="638" fill="#8ED9C3" font-family="IBM Plex Mono, monospace" font-size="14" font-weight="700">CALCULATED TOTAL</text>
    <text x="674" y="667" fill="#F6FFFB" font-family="Sora, Arial, sans-serif" font-size="28" font-weight="700">$1002.90</text>
